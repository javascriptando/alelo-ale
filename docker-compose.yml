# Stack isolada do Alelo. Portas deslocadas para não colidir com outros projetos.
services:
  db:
    image: postgres:16-alpine
    container_name: alelo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alelo
    ports:
      - '5435:5432'
    volumes:
      - alelo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d alelo']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: alelo-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  evolution:
    # Newest stable; lets Evolution auto-manage the WhatsApp Web version.
    image: evoapicloud/evolution-api:latest
    container_name: alelo-evolution
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: alelo-evo-key-2026
      # Persistence (Evolution v2 uses Prisma/Postgres)
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@db:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      DATABASE_SAVE_DATA_CONTACTS: 'true'
      DATABASE_SAVE_DATA_CHATS: 'true'
      # Cache
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: 'false'
      # IMPORTANT: do NOT enable the global webhook here. The backend sets a
      # per-instance webhook on startup; having both fire the same endpoint
      # delivers every inbound message twice. Per-instance only.
      WEBHOOK_GLOBAL_ENABLED: 'false'
      QRCODE_LIMIT: '30'
      # NOTE: If QR generation fails ("codeError 515, requesting reconnect"), it's
      # the known upstream Baileys/WhatsApp version drift. Pin a currently-working
      # WA Web version here (check Baileys releases): CONFIG_SESSION_PHONE_VERSION.
      LOG_LEVEL: ERROR
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  alelo_pg:
